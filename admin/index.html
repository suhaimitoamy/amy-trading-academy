<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Panel — Amy Trading Academy</title>
  <link rel="stylesheet" href="css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Top bar -->
  <header class="admin-topbar">
    <div class="topbar-left">
      <span class="admin-logo">A</span>
      <span class="admin-title">Admin Panel</span>
    </div>
    <div class="topbar-right">
      <a href="editor.html" class="btn btn-primary btn-sm">+ Materi Baru</a>
      <a href="../index.html" class="btn btn-ghost btn-sm" target="_blank">🔗 Lihat Site</a>
    </div>
  </header>
  
  <!-- Main content -->
  <main class="admin-main">
    <div class="admin-container">
      <div class="dashboard-header">
        <h1>📚 Daftar Materi</h1>
        <p class="text-muted">Kelola semua materi Amy Trading Academy</p>
        <div class="dashboard-stats" id="dashboardStats">
          <!-- Stats rendered by JS -->
        </div>
      </div>
      
      <div class="search-filter-bar">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Cari materi berdasarkan judul...">
        </div>
        <div class="filter-chips" id="filterChips">
          <button class="chip active" data-filter="all">Semua</button>
          <button class="chip" data-filter="pemula">Pemula</button>
          <button class="chip" data-filter="ict">ICT</button>
          <button class="chip" data-filter="risk">Risk</button>
          <button class="chip" data-filter="psikologi">Psikologi</button>
          <button class="chip" data-filter="mandiri">Mandiri</button>
          <button class="chip" data-filter="advanced">Advanced</button>
        </div>
      </div>
      
      <div class="bagian-grid" id="bagianGrid">
        <!-- Cards generated by JS -->
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
