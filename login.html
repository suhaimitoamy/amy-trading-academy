<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Login — Amy Trading Academy</title><link rel="stylesheet" href="assets/css/style.css"><script>const ROOT_PATH='';</script><script src="assets/js/auth.js"></script></head><body><main class="login-wrap"><section class="login-card"><div class="brand"><span class="brand-mark">A</span><span>Amy Trading Academy</span></div><h1>Masuk Materi</h1><p>Masukkan kode akses yang dibuat dari GitHub Actions.</p><input id="code" placeholder="AMY-XXXX-XXXX" autocomplete="one-time-code"><button class="btn primary" id="loginBtn">Masuk</button><p class="login-status" id="status"></p><div class="warning"><strong>Catatan:</strong> kode dibuat dari GitHub, bukan dari halaman website. Jalankan workflow <em>Generate Access Codes</em> di repo untuk membuat kode baru.</div></section></main><script>document.getElementById('loginBtn').onclick=async()=>{const status=document.getElementById('status');status.textContent='Mengecek kode...';const r=await validateCode(document.getElementById('code').value);if(r.ok){status.style.color='#2e7d55';status.textContent='Berhasil. Membuka materi...';setTimeout(()=>location.href='index.html',500);}else{status.style.color='#a33';status.textContent=r.message||'Kode tidak valid.';}};document.getElementById('code').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginBtn').click();});</script></body></html>
