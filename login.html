<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Login — Amy FX Academy</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script>const ROOT_PATH='';</script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/main.js" defer></script>
</head>
<body>
  <main class="login-wrap">
    <section class="login-card">
      <div class="brand">
        <span class="brand-mark">A</span>
        <span>Amy FX Academy</span>
      </div>
      <h1>Masuk Materi</h1>
      <p>Masukkan kode akses yang valid untuk melanjutkan.</p>
      
      <input id="code" placeholder="AMY-XXXX-XXXX" autocomplete="one-time-code">
      <button class="btn primary" id="loginBtn">Masuk ke Akademi</button>
      <p class="login-status" id="status"></p>
      
      <div class="tip">
        <strong>Akses Privat:</strong> Website ini membutuhkan kode akses khusus untuk membaca materi.
      </div>
    </section>
  </main>

  <script>
    document.getElementById('loginBtn').onclick = async () => {
      const status = document.getElementById('status');
      status.textContent = 'Mengecek kode...';
      status.style.color = 'inherit';
      
      const r = await validateCode(document.getElementById('code').value);
      if(r.ok) {
        status.style.color = '#1a7a4a'; // Emerald green
        status.textContent = 'Berhasil. Membuka materi...';
        
        // Cek URL params untuk redirect (fixing next= parameter bug)
        const urlParams = new URLSearchParams(window.location.search);
        const nextUrl = urlParams.get('next') || 'index.html';
        
        setTimeout(() => location.href = nextUrl, 500);
      } else {
        status.style.color = '#c44';
        status.textContent = r.message || 'Kode tidak valid.';
      }
    };
    
    document.getElementById('code').addEventListener('keydown', e => {
      if(e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
